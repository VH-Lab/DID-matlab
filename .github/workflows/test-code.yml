name: Test code

on:
  push:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  pull_request:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-code:
    # Flat workflow that just runs the self-test suite. The
    # ehennestad/matbox-actions/check-code@v1 step that this used to
    # call breaks on fresh runners with "codecheckToolbox: Too many
    # input arguments" — the matbox MATLAB toolbox installed by
    # install-matbox no longer matches what check-code passes to it.
    # NDI-matlab's CI still passes because its setup-matlab cache
    # predates the matbox change; ours is cold. Drop the static-
    # analysis step for now; re-add either when matbox-actions is
    # fixed upstream, or via MATLAB's built-in codeAnalyzer.
    name: Run self-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Install repo dependencies (mksqlite, vhlab-toolbox-matlab)
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tools"));
            matbox.installRequirements(didtools.projectdir());

      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            import matlab.unittest.TestRunner;
            import matlab.unittest.TestSuite;
            runner = TestRunner.withTextOutput;
            suite = TestSuite.fromFolder("tests", "IncludingSubfolders", true);
            results = runner.run(suite);
            disp(table(results));
            nFailed = sum([results.Failed]);
            assert(nFailed == 0, sprintf("%d test(s) failed", nFailed));
