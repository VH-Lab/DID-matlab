name: Test code

on:
  push:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  pull_request:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-code:
    # Flat workflow modeled on NDI-matlab/.github/workflows/run-tests.yml.
    # Order matters: check-code runs immediately after install-matbox,
    # before any other step touches the MATLAB path. An earlier ordering
    # that ran matbox.installRequirements() first made check-code fail
    # with "codecheckToolbox: Too many input arguments" even on
    # release: latest. installRequirements is moved after check-code
    # since the tests need mksqlite + vhlab-toolbox-matlab but the
    # static analysis does not.
    name: Analyse and test code
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out did-schema (sibling, for V_delta validation)
        uses: actions/checkout@v4
        with:
          repository: Waltham-Data-Science/did-schema
          ref: main
          path: did-schema

      - name: Export DID_SCHEMA_PATH
        run: |
          echo "DID_SCHEMA_PATH=${GITHUB_WORKSPACE}/did-schema/schemas/V_delta/stable" \
            >> "$GITHUB_ENV"

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Check code
        uses: ehennestad/matbox-actions/check-code@v1
        with:
          source_directory: 'src'

      - name: Install repo dependencies (mksqlite, vhlab-toolbox-matlab)
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tools"));
            matbox.installRequirements(didtools.projectdir());

      - name: Run tests
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            import matlab.unittest.TestRunner;
            import matlab.unittest.TestSuite;
            runner = TestRunner.withTextOutput;
            % did2 self-tests live under tests/+did2/+unittest/ now (the
            % legacy +did/+unittest/ layout). TestSuite.fromPackage with
            % IncludingSubpackages=true picks up the function-based test
            % files and any future +abstract base classes. Mirrors the
            % discovery pattern in test-symmetry.yml.
            suite = TestSuite.fromPackage("did2.unittest", "IncludingSubpackages", true);
            results = runner.run(suite);
            disp(table(results));
            nFailed = sum([results.Failed]);
            assert(nFailed == 0, sprintf("%d test(s) failed", nFailed));

      - name: Assemble V_epsilon schema set (stable + draft)
        # The schema cache loads a single flat dir of *.json. The
        # Brainstorm-E observation/manipulation classes live in
        # V_epsilon/draft while base/element/etc. live in V_epsilon/stable,
        # so combine both tiers (class names are disjoint across tiers)
        # into one directory for the V_epsilon corpus discovery step.
        if: always()
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/epsilon-schemas"
          cp did-schema/schemas/V_epsilon/stable/*.json "${GITHUB_WORKSPACE}/epsilon-schemas/"
          cp did-schema/schemas/V_epsilon/draft/*.json  "${GITHUB_WORKSPACE}/epsilon-schemas/"

      - name: Run V_epsilon corpus discovery (Brainstorm E split)
        # Isolated from the default V_delta test run above: its own
        # DID_SCHEMA_PATH (the combined V_epsilon dir) and the
        # DID_RUN_EPSILON_CORPUS gate that un-skips testCorpusEpsilon.
        # Discovery mode — the report is the deliverable; test failures
        # (errors, not quarantine) still surface.
        if: always()
        uses: matlab-actions/run-command@v2
        env:
          DID_SCHEMA_PATH: ${{ github.workspace }}/epsilon-schemas
          DID_RUN_EPSILON_CORPUS: '1'
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            results = runtests("did2.unittest.testCorpusEpsilon");
            disp(table(results));
            nFailed = sum([results.Failed]);
            assert(nFailed == 0, sprintf("%d V_epsilon corpus test(s) failed", nFailed));

      - name: Upload corpus discovery reports
        # Discovery-mode corpus tests (e.g., testCorpus20211116) write
        # JSON summaries into corpus-reports/. Upload them as a CI
        # artifact regardless of test outcome so the migrated/quarantine
        # signal survives the run.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-discovery-reports
          path: corpus-reports/
          if-no-files-found: ignore
