name: Test code

on:
  push:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  pull_request:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-code:
    name: Analyse and test code
    # Pinned to the matbox-actions SHA that main's last green CI run used
    # (Nov 2025). The floating @v1 tag was moved on 2026-05-01/02 to a
    # commit that calls codecheckToolbox with arguments the installed
    # matbox MATLAB toolbox does not accept ("Too many input arguments").
    # Revisit once upstream is fixed.
    uses: ehennestad/matbox-actions/.github/workflows/test-code-workflow.yml@4132d36
    with:
      matlab_release: R2021b
      matlab_use_cache: true
      matlab_products: Statistics_and_Machine_Learning_Toolbox
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
