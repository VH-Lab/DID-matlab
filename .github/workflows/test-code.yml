name: Test code

on:
  push:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  pull_request:
    branches: [main, V2]
    paths-ignore:
      - '*.md'
      - '.github/**'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-code:
    # Flat workflow modeled on NDI-matlab/.github/workflows/run-tests.yml,
    # which is currently green on @v1 pins. The previous
    # ehennestad/matbox-actions reusable workflow (test-code-workflow.yml)
    # was retagged on 2026-05-01/02 to call codecheckToolbox with new
    # arguments the installed matbox MATLAB toolbox rejects ("Too many
    # input arguments"). Calling install-matbox + check-code directly,
    # the way NDI-matlab does, avoids the broken wrapper.
    name: Analyse and test code
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2021b
          cache: true
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Install repo dependencies (mksqlite, vhlab-toolbox-matlab)
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tools"));
            matbox.installRequirements(didtools.projectdir());

      - name: Check code
        uses: ehennestad/matbox-actions/check-code@v1
        with:
          source_directory: 'src'

      - name: Run tests
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            import matlab.unittest.TestRunner;
            import matlab.unittest.TestSuite;
            runner = TestRunner.withTextOutput;
            suite = TestSuite.fromFolder("tests", "IncludingSubfolders", true);
            results = runner.run(suite);
            disp(table(results));
            nFailed = sum([results.Failed]);
            assert(nFailed == 0, sprintf("%d test(s) failed", nFailed));
